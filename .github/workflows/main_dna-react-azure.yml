name: Build and deploy Node.js app to Azure Web App - dna-react-azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4 # Updated to v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: npm install and build
        run: |
          npm install
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist # Only upload the built files

  deploy:
    runs-on: ubuntu-latest # Ubuntu is fine for the deployer runner even if the target is Windows
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./dist # Download into a specific folder

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7D9C87E3AFEF4D4C8B7F63769A7ADF40 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_778832A9D82B4DCCAB626E2CC1FF4ECA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4898CFF79C1640FCA6C61B508EFD271E }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'dna-react-azure'
          slot-name: 'Production'
          package: ./dist # Deploy the dist folder contents
